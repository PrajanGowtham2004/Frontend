<html>

<head>
    <title>Login and Signup Form</title>
</head>

<body>

    <section>

        <div>

            <center>

                <h1>Login Form</h1>

                <form>

                    <label>Email:</label>
                    <input 
                        type="email"
                        placeholder="Enter your email"
                        required
                    >

                    <br><br>

                    <label>Password:</label>
                    <input 
                        type="password"
                        placeholder="Enter password"
                        minlength="6"
                        maxlength="12"
                        required
                    >

                    <br><br>

                    <input type="submit" value="Login">

                    <input type="reset" value="Clear">

                </form>

                <br><br><hr>

                <h1>Signup Form</h1>

                <form>

                    <label>Full Name:</label>
                    <input 
                        type="text"
                        placeholder="Enter your full name"
                        minlength="3"
                        maxlength="25"
                        required
                    >

                    <br><br>

                    <label>Email:</label>
                    <input 
                        type="email"
                        placeholder="Enter your email"
                        required
                    >

                    <br><br>

                    <label>Password:</label>
                    <input 
                        type="password"
                        placeholder="Create password"
                        minlength="6"
                        maxlength="12"
                        required
                    >

                    <br><br>

                    <label>Phone Number:</label>
                    <input 
                        type="tel"
                        placeholder="Enter phone number"
                        minlength="10"
                        maxlength="10"
                        required
                    >

                    <br><br>

                    <input type="submit" value="Signup">

                    <input type="reset" value="Clear">

                </form>

            </center>

        </div>

    </section>

</body>

</html>
