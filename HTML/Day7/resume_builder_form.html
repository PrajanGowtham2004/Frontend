<html>

<head>
    <title>Resume Builder Form</title>
</head>

<body>

    <section>

        <div>

            <center>

                <h1>Resume Builder Form</h1>

                <form>



                    <fieldset>

                        <legend>Personal Details</legend>

                        <label>Full Name:</label>
                        <input type="text"
                            placeholder="Enter your full name"
                            required>

                        <br><br>

                        <label>Email:</label>
                        <input type="email"
                            placeholder="Enter your email"
                            required>

                        <br><br>

                        <label>Password:</label>
                        <input type="password"
                            placeholder="Enter password"
                            required>

                        <br><br>

                        <label>Phone Number:</label>
                        <input type="tel"
                            placeholder="Enter phone number" minlength="10" maxlength="10"
                            required>

                        <br><br>

                        <label>Date of Birth:</label>
                        <input type="date">

                        <br><br>

                        <label>Gender:</label>

                        <input type="radio" name="gender">
                        <label>Male</label>

                        <input type="radio" name="gender">
                        <label>Female</label>

                        <input type="radio" name="gender">
                        <label>Other</label>

                        <br><br>

                        <label>Address:</label>

                        <br>

                        <textarea rows="5" cols="40"
                            placeholder="Enter your address"></textarea>

                    </fieldset>

                    <br>


                    <fieldset>

                        <legend>Education Details</legend>

                        <label>College Name:</label>
                        <input type="text"
                            placeholder="Enter college name">

                        <br><br>

                        <label>Degree:</label>

                        <select>

                            <option value="" disabled selected>
                                Choose Degree
                            </option>

                            <option>B.E</option>
                            <option>B.Tech</option>
                            <option>B.Sc</option>
                            <option>BCA</option>
                            <option>MCA</option>

                        </select>

                        <br><br>

                        <label>Department:</label>

                        <select>

                            <option value="" disabled selected>
                                Choose Department
                            </option>

                            <option>CSE</option>
                            <option>ECE</option>
                            <option>EEE</option>
                            <option>Mechanical</option>
                            <option>Civil</option>

                        </select>

                        <br><br>

                        <label>Year of Passing:</label>
                        <input type="number"
                            placeholder="Enter passing year">

                        <br><br>

                        <label>CGPA / Percentage:</label>
                        <input type="text"
                            placeholder="Enter CGPA or percentage">

                    </fieldset>

                    <br>


                    <fieldset>

                        <legend>Skills</legend>

                        <input type="checkbox">
                        <label>HTML</label>

                        <input type="checkbox">
                        <label>CSS</label>

                        <input type="checkbox">
                        <label>JavaScript</label>

                        <input type="checkbox">
                        <label>Java</label>

                        <input type="checkbox">
                        <label>Python</label>

                        <input type="checkbox">
                        <label>SQL</label>

                        <br><br>

                        <label>Other Skills:</label>

                        <br>

                        <textarea rows="4" cols="40"
                            placeholder="Enter additional skills"></textarea>

                    </fieldset>

                    <br>


                    <fieldset>

                        <legend>Experience Details</legend>

                        <label>Fresher / Experienced:</label>

                        <input type="radio" name="experience">
                        <label>Fresher</label>

                        <input type="radio" name="experience">
                        <label>Experienced</label>

                        <br><br>

                        <label>Company Name:</label>
                        <input type="text"
                            placeholder="Enter company name">

                        <br><br>

                        <label>Job Role:</label>
                        <input type="text"
                            placeholder="Enter job role">

                        <br><br>

                        <label>Years of Experience:</label>
                        <input type="number"
                            placeholder="Enter experience">

                        <br><br>

                        <label>Project Details:</label>

                        <br>

                        <textarea rows="5" cols="40"
                            placeholder="Enter project details"></textarea>

                    </fieldset>

                    <br>

                    <fieldset>

                        <legend>Upload Documents</legend>

                        <label>Upload Resume:</label>
                        <input type="file">

                        <br><br>

                        <label>Upload Photo:</label>
                        <input type="file">

                    </fieldset>

                    <br>

                    <input type="submit" value="Create Resume">

                    <input type="reset" value="Clear">

                </form>

            </center>

        </div>

    </section>

</body>

</html>
