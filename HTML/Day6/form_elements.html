<html>

<head>
    <title>Justice League Registration Form</title>
</head>

<body>

    <section>

        <div>

          <center>  

            <form>
                <h1>Justice League Recruitment Form</h1>

                <label>Hero Name:</label>
                <input type="text" placeholder="Enter your hero name" required>

                <br><br>

                <label>Real Name:</label>
                <input type="text" placeholder="Enter your real name" required>

                <br><br>

                <label>Email Address:</label>
                <input type="email" placeholder="Enter your email" required>

                <br><br>

                <label>Create Password:</label>
                <input type="password" placeholder="Create password" required>

                <br><br>

                <label>Age:</label>
                <input type="number" placeholder="Enter your age" min="18" max="70">

                <br><br>

                <label>Phone Number:</label>
                <input type="tel" placeholder="Enter your phone number" maxlength="10" minlength="10">

                <br><br>

                <label>Select Gender:</label>

                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender" value="Female"> Female
                <input type="radio" name="gender" value="Other"> Other

                <br><br>

                <label>Select Your Planet:</label>

                <select>
                    <option>Earth</option>
                    <option>Krypton</option>
                    <option>Themyscira</option>
                    <option>Atlantis</option>
                    <option>Mars</option>
                </select>

                <br><br>

                <label>Choose Your Superpower:</label>

                <input type="checkbox"> Flight
                <input type="checkbox"> Super Speed
                <input type="checkbox"> Strength
                <input type="checkbox"> Invisibility

                <br><br>

                <label>Date of Birth:</label>
                <input type="date">

                <br><br>

                <label>Mission Available Time:</label>
                <input type="time">

                <br><br>

                <label>Joining Month:</label>
                <input type="month">

                <br><br>

                <label>Upload Hero Costume Image:</label>
                <input type="file">

                <br><br>

                <label>Secret Identity Number:</label>
                <input type="number" value="2026" readonly>

                <br><br>

                <label>Why do you want to join Justice League?</label>

                <textarea placeholder="Enter your reason"></textarea>

                <br><br>

                <label>Headquarters Location:</label>
                <input type="text" placeholder="Enter your city">

                <br><br>

                <label>Emergency Contact:</label>
                <input type="tel" placeholder="Emergency phone number">

                <br><br>

                <label>Website or Hero Profile:</label>
                <input type="url" placeholder="Enter website URL">

                <br><br>

                <label>Search Your Enemy:</label>
                <input type="search" placeholder="Search villain">

                <br><br>

                <h3 contenteditable="true">
                    Edit your personal hero quote here
                </h3>

                <br>

                <input type="hidden" value="JusticeLeague2026">

                <input type="submit" value="Join Justice League">

                <input type="reset" value="Reset Form">

            </form>
            
          </center>

        </div>

    </section>

</body>

</html>
